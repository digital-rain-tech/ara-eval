name: Share a business scenario
description: Tell us about a business situation where AI autonomy gets interesting
title: ""
labels: ["scenario"]
body:
  - type: markdown
    attributes:
      value: |
        **You don't need to know anything about our framework.** Just tell us about a real business situation — something that happened at work, something you read in the news, or a workflow where you've wondered "could an AI just handle this?"

        We'll do the rest: structure it, run it through the evaluation pipeline, and credit you.

  - type: textarea
    id: story
    attributes:
      label: What happened?
      description: Describe the situation in your own words. What was going on? What made it tricky? No need to structure it — just tell it like you'd tell a colleague.
      placeholder: |
        Examples:

        "Our claims team processes 500+ small claims a day. Most are straightforward but about 5% involve cross-border coverage where the rules are different. We've been talking about automating the straightforward ones but nobody can agree on where to draw the line."

        "A bank got fined because their screening system was missing certain names that were transliterated differently from Mandarin. The system had been auto-clearing alerts below a threshold for over a year." (include link if public)
    validations:
      required: true

  - type: dropdown
    id: industry
    attributes:
      label: What industry?
      options:
        - Banking
        - Insurance
        - Capital Markets
        - Wealth Management
        - Healthcare
        - Logistics & Supply Chain
        - Legal
        - Technology
        - Real Estate
        - Retail & E-commerce
        - Energy & Utilities
        - Government & Public Sector
        - Education
        - Manufacturing
        - Telecommunications
        - Other
    validations:
      required: true

  - type: dropdown
    id: company_size
    attributes:
      label: Rough company size?
      options:
        - Small (under 500 people)
        - Mid-size (500-5,000)
        - Large (5,000+)
        - Not applicable / public news story
    validations:
      required: true

  - type: dropdown
    id: public
    attributes:
      label: Is this from public reporting?
      description: If yes, include a link in your story above. Public stories don't need anonymization.
      options:
        - "No — this is from my own experience (I've kept it anonymized)"
        - "Yes — this was reported publicly (link included above)"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Optional — jurisdiction, regulatory context, what you think the right call was, whatever you want to add.
      placeholder: This is optional.
    validations:
      required: false
